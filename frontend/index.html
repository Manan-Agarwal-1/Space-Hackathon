<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ACM Orbital Insight Dashboard</title>
    <style>
      body {font-family: Arial, sans-serif; margin: 16px;}
      h1 {margin-bottom: 8px;}
      pre {background:#f5f5f5; padding:12px; border-radius:6px;}
    </style>
  </head>
  <body>
    <h1>Autonomous Constellation Manager - Dashboard</h1>
    <button onclick="fetchSnapshot()">Refresh Snapshot</button>
    <pre id="payload">loading...</pre>

    <script>
      async function fetchSnapshot() {
        try {
          const res = await fetch('http://localhost:8000/api/visualization/snapshot');
          const body = await res.json();
          document.getElementById('payload').innerText = JSON.stringify(body, null, 2);
        } catch (err) {
          document.getElementById('payload').innerText = 'error: ' + err;
        }
      }
      fetchSnapshot();
    </script>
  </body>
</html>
